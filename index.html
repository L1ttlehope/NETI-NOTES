<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETI NOTES</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/favicon.svg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <nav class="header__nav">
                <img src="images/neti notes.svg" alt="">
                <ul class="header__list">
                    <li class="header__list-item">
                        <a class="header__list-link active" href="">Главная страница</a>
                    </li>
                    <li>
                        <a class="header__list-link" href="">Поиск конспектов</a>
                    </li>
                    <li>
                        <a class="header__list-link" href="">Поиск лабораторных работ</a>
                    </li>
                </ul>
                <a class="header__button" href="">Вход</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="hero">
  <div class="container">
    <h1>
      Не просто скачать, а понять.<br>
      Наши конспекты — это ясно и структурно.
    </h1>
    <div class="search-bar">
      <div class="search-item">
        <span class="icon">🔍</span>
        <input type="text" placeholder="Факультет">
      </div>

      <div class="search-item">
        <span class="icon">🎓</span>
        <input type="text" placeholder="Дисциплина и преподаватель">
      </div>
      <button class="search-btn">Искать</button>
    </div>
  </div>
  <div class="hero-image">
    <img src="images/photo.svg" alt="">
  </div>
</section>
<section class="faculties">
            <div class="faculties__container">
                <h2 class="faculties__title">Конспекты<br><span class="faculties__subtitle">по факультетам</span></h2>
                
                <div class="faculties__grid">
                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">
                            <img src="images/АВТФ.svg" alt="">
                        </div>
                        <span class="faculty-card__abbr">АВТФ</span>
                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">
                            <img src="images/ФЛА.svg" alt="НГТУ НЭТИ">
                        </div>
                        <span class="faculty-card__abbr">ФЛА</span>
                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">
                            <img src="images/МТФ.svg" alt="НГТУ НЭТИ">
                        </div>
                        <span class="faculty-card__abbr">МТФ</span>
                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">
                            <img src="images/ФМА.svg" alt="НГТУ НЭТИ">
                        </div>
                        <span class="faculty-card__abbr">ФМА</span>
                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">
                            <img src="images/ФПМИ.svg" alt="НГТУ НЭТИ">
                        </div>
                        <span class="faculty-card__abbr">ФПМИ</span>
                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">
                            <img src="images/РЭФ.svg" alt="НГТУ НЭТИ">
                        </div>
                        <span class="faculty-card__abbr">РЭФ</span>
                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">
                            <img src="images/ФТФ.svg" alt="НГТУ НЭТИ">
                        </div>
                        <span class="faculty-card__abbr">ФТФ</span>
                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">
                            <img src="images/ФЭН.svg" alt="НГТУ НЭТИ">
                        </div>
                        <span class="faculty-card__abbr">ФЭН</span>
                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">

                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">

                    </a>

                    <a href="" class="faculty-card">
                        <div class="faculty-card__logo">

                        </div>
                        <span class="faculty-card__abbr">ИСТ</span>
                    </a>
                </div>
            </div>
        </section>

</html>
